<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiosco — editor de revista (web)</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23b3402a'/%3E%3Ctext x='32' y='46' font-family='Georgia,serif' font-size='40' font-weight='bold' fill='white' text-anchor='middle'%3EQ%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="ui.css">
<style>
  #banner {
    background: #fdf3d7;
    border-bottom: 1px solid #e8d9a8;
    color: #6b5a1e;
    font-size: 12px;
    padding: 7px 18px;
    line-height: 1.4;
  }
  #banner a { color: inherit; font-weight: 600; }
</style>
</head>
<body>
  <div id="banner">
    <strong>Versión web.</strong> La revista se guarda solo en este navegador y la extracción
    usa proxies públicos (puede fallar según el sitio). Para el PDF de imprenta,
    usa la <a href="https://github.com/RodrigoAA/quiosco" target="_blank">versión local</a>.
  </div>
  <header id="topbar">
    <h1>Quiosco</h1>
    <div class="actions">
      <button id="focusBtn" class="btn icon" type="button"
        title="Vista completa: oculta el editor para revisar la revista (Esc para volver)">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      </button>
      <button id="printBtn" class="btn primary icon" type="button"
        title="Imprimir / guardar como PDF desde el navegador: escala 100 %, márgenes «Ninguno», «Gráficos de fondo» activado">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      </button>
    </div>
  </header>

  <button id="focusExit" type="button" title="Volver al editor (Esc)">✎ Volver al editor</button>

  <main>
    <aside id="sidebar">
      <details class="panel" id="pn-articulos" open>
        <summary>Artículos</summary>
        <form id="addForm">
          <input id="addUrl" type="url" placeholder="https://…" required
            title="Substack, blog o post/hilo de X. Para un hilo: pega cualquier post; si no está en ThreadReaderApp, pega el último para tenerlo completo">
          <button id="addBtn" class="btn primary" type="submit">Añadir</button>
        </form>
        <p id="addError" class="error hidden"></p>
        <ul id="articleList"></ul>
      </details>

      <details class="panel" id="pn-revista" open>
        <summary>Revista</summary>
        <label>Título
          <input id="s-title" type="text">
        </label>
        <label>Subtítulo
          <input id="s-subtitle" type="text">
        </label>
        <div class="row2">
          <label>Número
            <input id="s-issue" type="text" placeholder="Nº 1">
          </label>
          <label>Fecha
            <input id="s-date" type="text" placeholder="auto: mes actual">
          </label>
        </div>
        <label>Imagen de portada (URL)
          <input id="s-coverImage" type="text" placeholder="vacío = primera imagen disponible">
        </label>
        <div class="row2" style="margin-top: 4px">
          <button id="exportJson" class="btn" type="button"
            title="Descarga la revista como magazine.json (compatible con la app local)">Exportar JSON</button>
          <button id="importJson" class="btn" type="button"
            title="Carga un magazine.json de la app local o de otro navegador">Importar JSON</button>
          <input id="importFile" type="file" accept=".json,application/json" class="hidden">
        </div>
      </details>

      <details class="panel" id="pn-diseno">
        <summary>Diseño</summary>
        <label>Color de acento
          <input id="s-accent" type="color">
        </label>
        <div id="paletteRow" class="palette-row hidden">
          <span class="palette-label">De la portada:</span>
          <span id="swatches"></span>
          <button id="eyedropper" class="btn" type="button"
            title="Cuentagotas: elige un color de cualquier punto de la pantalla">🎨</button>
        </div>
        <label>Tipografía
          <select id="s-font">
            <option value="clasica">Clásica — Georgia</option>
            <option value="editorial">Editorial — Playfair Display + Lora</option>
            <option value="elegante">Elegante — Garamond</option>
            <option value="glossy">Glossy — Fraunces + Source Serif</option>
            <option value="libro">Libro — Spectral + Crimson</option>
            <option value="prensa">Prensa — Archivo + Newsreader</option>
            <option value="diario">Diario — Franklin + Merriweather</option>
            <option value="cartel">Cartel — Oswald + Bitter</option>
            <option value="moderna">Moderna — Inter (todo sans)</option>
            <option value="suiza">Suiza — Space Grotesk + Work Sans</option>
          </select>
        </label>
        <div class="row2">
          <label>Columnas
            <select id="s-columns">
              <option value="1">1 — ensayo</option>
              <option value="2">2 — revista</option>
              <option value="3">3 — prensa</option>
              <option value="4">4 — boletín</option>
            </select>
          </label>
          <label>Alineación
            <select id="s-align">
              <option value="justificado">Justificado</option>
              <option value="izquierda">Izquierda</option>
            </select>
          </label>
        </div>
        <div class="row2">
          <label>Contraportada
            <select id="s-backstyle">
              <option value="raya">Raya de color</option>
              <option value="area">Área de color</option>
            </select>
          </label>
          <label>Párrafos
            <select id="s-paragraphs">
              <option value="sangria">Sangría — clásico</option>
              <option value="espaciado">Espaciado — aireado</option>
            </select>
          </label>
        </div>
        <label>Acabado
          <select id="s-finish">
            <option value="caballete">Grapada — contraportada y múltiplo de 4</option>
            <option value="normal">Hojas sueltas / espiral — sin contraportada</option>
          </select>
        </label>
        <label>Imagen de cierre (URL)
          <input id="s-fillerImage" type="text" placeholder="viste la última página blanca del final">
        </label>
        <label>Composición de cierre (2–4 URLs)
          <textarea id="s-fillerMosaic" rows="2" placeholder="separadas por comas — cuadrícula en otra blanca"></textarea>
        </label>
      </details>
    </aside>

    <section id="previewWrap">
      <div class="preview-tools">
        <span class="pt-left">
          <button id="imgEditBtn" class="btn icon" type="button"
            title="Recortar: pulsa imágenes o selecciona texto para marcarlos; en rojo, vuelve a pulsar para salir cancelando">
            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
          </button>
          <span id="trimInfo" class="trim-info hidden"></span>
          <button id="applyBtn" class="btn confirm hidden" type="button" title="Aplicar los recortes marcados">
            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            Aplicar
          </button>
          <button id="trimCancelBtn" class="btn icon hidden" type="button" title="Salir del modo recorte sin aplicar">
            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <button id="undoBtn" class="btn icon hidden" type="button" title="Deshacer el último recorte aplicado">
            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
        </span>
        <span class="pt-center">
          <span id="zoomBox" class="tb-group">
            <button id="zoomOut" class="btn icon" type="button" title="Reducir">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <span id="zoomVal">65 %</span>
            <button id="zoomIn" class="btn icon" type="button" title="Ampliar">
              <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </span>
          <span id="navBox" class="tb-group hidden">
            <input id="pageInput" type="number" min="1" value="1" title="Ir a la página…">
            <span id="pageTotal">de ?</span>
          </span>
        </span>
        <span class="pt-right">
          <span id="status" class="status"></span>
        </span>
      </div>
      <iframe id="preview" src="print.html" title="Previsualización de la revista"></iframe>
    </section>
  </main>

  <script src="vendor/Readability.js"></script>
  <script src="extract-web.js"></script>
  <script src="app.js"></script>
</body>
</html>
